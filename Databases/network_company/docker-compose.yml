version: '3.8'

services:
    db:
        image: mysql:8.0
        container_name: database
        restart: always
        environment:
            MYSQL_DATABASE: empresa_internet
            MYSQL_USER: myuser
            MYSQL_PASSWORD: mypass
            MYSQL_ROOT_PASSWORD: rootpass
        ports:
            - "3306:3306"
        volumes:
            - db_data:/var/lib/mysql

volumes:
    db_data: